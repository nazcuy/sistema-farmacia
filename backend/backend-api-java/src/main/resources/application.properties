# ===================================================================
# CONFIGURACIÓN GENERAL
# ===================================================================
spring.application.name=backend-api-java
server.port=8080

# ===================================================================
# CONFIGURACIÓN DE BASE DE DATOS (MySQL)
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_farmacia?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Sartre88.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===================================================================
# 'update' crea las tablas si no existen o las actualiza sin borrar datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACIÓN DE SEGURIDAD (JWT)
# ===================================================================
app.jwt.secret=${JWT_SECRET}
# Expiración del token: 86400000 ms = 24 horas
app.jwt.expiration=86400000

# ===================================================================
# LOGGING Y VALIDACIÓN
# ===================================================================
logging.level.org.springframework.security=DEBUG
spring.messages.encoding=UTF-8
